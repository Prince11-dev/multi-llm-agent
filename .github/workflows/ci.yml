name: Multi-LLM Agent CI

on:
  push:
    branches:
      - main
      - master

  pull_request:
    branches:
      - main
      - master

jobs:

  backend:

    name: Backend

    runs-on: ubuntu-latest

    env:
      PYTHONPATH: ${{ github.workspace }}

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Upgrade pip
        run: |
          python -m pip install --upgrade pip

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Verify Backend
        run: |
          python -c "import app"
          python -c "from app.main import app"
          python -c "print('Backend imported successfully.')"

      - name: Debug Repository
        run: |
          echo "====================================="
          echo "Current Directory"
          echo "====================================="
          pwd

          echo ""
          echo "====================================="
          echo "Repository Files"
          echo "====================================="
          find .

          echo ""
          echo "====================================="
          echo "pytest.ini"
          echo "====================================="
          cat pytest.ini

          echo ""
          echo "====================================="
          echo "Tests Folder"
          echo "====================================="
          ls -la tests

          echo ""
          echo "====================================="
          echo "test_agent.py"
          echo "====================================="
          cat tests/test_agent.py

          echo ""
          echo "====================================="
          echo "test_health.py"
          echo "====================================="
          cat tests/test_health.py

          echo ""
          echo "====================================="
          echo "Python Version"
          echo "====================================="
          python --version

          echo ""
          echo "====================================="
          echo "Pytest Version"
          echo "====================================="
          python -m pytest --version

      - name: Run Tests
        run: |
          python -m pytest -v tests

  frontend:

    name: Frontend

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: |
          npm install

      - name: Build React Application
        run: |
          npm run build